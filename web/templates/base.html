<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hệ thống giám sát giao thông thông minh sử dụng AI"
    />
    <meta
      name="keywords"
      content="giám sát giao thông, AI, vi phạm giao thông"
    />
    <title>{% block title %}Hệ thống giám sát giao thông{% endblock %}</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />

    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />

    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <style>
      :root {
        --primary-color: #0ea5e9;
        --primary-dark: #0284c7;
        --primary-light: #38bdf8;
        --secondary-color: #1e293b;
        --secondary-light: #334155;
        --accent-color: #06b6d4;
        --success-color: #10b981;
        --danger-color: #ef4444;
        --warning-color: #f59e0b;
        --info-color: #3b82f6;
        --dark-color: #1e293b;
        --light-bg: #ffffff;
        --gray-50: #f8fafc;
        --gray-100: #f1f5f9;
        --gray-200: #e2e8f0;
        --text-light: #64748b;
        --border-color: #e2e8f0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Segoe UI",
          -apple-system,
          BlinkMacSystemFont,
          "Roboto",
          "Helvetica Neue",
          Arial,
          sans-serif;
        background: linear-gradient(
          135deg,
          #f0f9ff 0%,
          #e0f2fe 50%,
          #ffffff 100%
        );
        color: var(--dark-color);
        overflow-x: hidden;
        min-height: 100vh;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Segoe UI", "Roboto", "Helvetica Neue", Arial, sans-serif;
        font-weight: 600;
      }

      /* Smooth scrollbar */
      ::-webkit-scrollbar {
        width: 10px;
      }

      ::-webkit-scrollbar-track {
        background: var(--gray-100);
      }

      ::-webkit-scrollbar-thumb {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--primary-dark)
        );
        border-radius: 10px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--primary-dark);
      }

      /* Loading spinner */
      .page-loader {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: white;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition:
          opacity 0.5s,
          visibility 0.5s;
      }

      .page-loader.hidden {
        opacity: 0;
        visibility: hidden;
      }

      .spinner {
        width: 50px;
        height: 50px;
        border: 5px solid rgba(14, 165, 233, 0.2);
        border-top: 5px solid var(--primary-color);
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      /* CARDS */
      .card-custom {
        border: none;
        border-radius: 16px;
        box-shadow: 0 4px 20px rgba(14, 165, 233, 0.1);
        transition:
          transform 0.3s,
          box-shadow 0.3s;
        overflow: hidden;
        background: white;
        border: 1px solid rgba(14, 165, 233, 0.15);
      }

      .card-custom:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 30px rgba(14, 165, 233, 0.2);
        border-color: var(--primary-color);
      }

      .card-header-custom {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        padding: 1.25rem;
        font-weight: 600;
        font-size: 1.1rem;
        border-bottom: none;
      }

      /* STATS CARDS */
      .stat-card {
        background: white;
        border-radius: 16px;
        padding: 2rem 1.5rem;
        text-align: center;
        box-shadow: 0 4px 20px rgba(14, 165, 233, 0.1);
        transition: all 0.3s;
        border: 1px solid rgba(14, 165, 233, 0.15);
      }

      .stat-card:hover {
        transform: translateY(-8px);
        box-shadow: 0 12px 35px rgba(14, 165, 233, 0.25);
        border-color: var(--primary-color);
      }

      .stat-card i {
        font-size: 3rem;
        margin-bottom: 1rem;
        opacity: 0.9;
      }

      .stat-card h3 {
        font-size: 2.8rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .stat-card p {
        font-size: 1rem;
        color: #64748b;
        margin: 0;
        font-weight: 500;
      }

      .stat-card.primary {
        background: linear-gradient(135deg, #0ea5e9 0%, #0284c7 100%);
        color: white;
        box-shadow: 0 4px 20px rgba(14, 165, 233, 0.3);
      }

      .stat-card.success {
        background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        color: white;
        box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
      }

      .stat-card.danger {
        background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
        color: white;
        box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
      }

      .stat-card.primary p,
      .stat-card.success p,
      .stat-card.danger p {
        color: rgba(255, 255, 255, 0.95);
      }

      /* BUTTONS */
      .btn-custom {
        padding: 0.7rem 1.8rem;
        border-radius: 10px;
        font-weight: 600;
        transition: all 0.3s;
        border: none;
      }

      .btn-custom-primary {
        background: linear-gradient(
          135deg,
          var(--primary-color) 0%,
          var(--primary-dark) 100%
        );
        color: white;
        font-weight: 600;
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
      }

      .btn-custom-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(14, 165, 233, 0.5);
        color: white;
        background: linear-gradient(
          135deg,
          var(--primary-dark) 0%,
          var(--primary-color) 100%
        );
      }

      /* PAGINATION */
      .pagination-custom .page-link {
        border-radius: 10px;
        margin: 0 0.25rem;
        border: 1px solid var(--border-color);
        color: var(--primary-color);
        font-weight: 600;
        background: white;
      }

      .pagination-custom .page-link:hover {
        background: var(--primary-color);
        color: white;
        border-color: var(--primary-color);
      }

      .pagination-custom .page-item.active .page-link {
        background: var(--primary-color);
        border-color: var(--primary-color);
        color: white;
        box-shadow: 0 4px 15px rgba(14, 165, 233, 0.3);
      }

      /* BADGES */
      .badge-custom {
        padding: 0.5rem 1rem;
        border-radius: 20px;
        font-weight: 600;
      }

      /* TABLE */
      .table {
        background: white;
      }

      .table-light {
        background: linear-gradient(
          135deg,
          rgba(14, 165, 233, 0.05),
          rgba(56, 189, 248, 0.05)
        );
        color: var(--dark-color);
        font-weight: 600;
      }

      .table-hover tbody tr:hover {
        background: rgba(14, 165, 233, 0.05);
      }

      /* Utilities */
      .text-gradient {
        background: linear-gradient(
          135deg,
          var(--primary-color),
          var(--primary-light)
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
    </style>

    {% block extra_css %}{% endblock %}
  </head>
  <body>
    <div class="page-loader" id="pageLoader">
      <div class="spinner"></div>
    </div>

    {% include 'includes/navbar.html' %}

    <main>{% block content %}{% endblock %}</main>

    {% include 'includes/footer.html' %}

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <script>
      // Page loader
      window.addEventListener("load", function () {
        document.getElementById("pageLoader").classList.add("hidden");
      });

      // Initialize AOS
      AOS.init({
        duration: 1000,
        once: true,
        offset: 100,
      });

      // Smooth scroll for anchor links
      document.querySelectorAll('a[href^="#"]').forEach((anchor) => {
        anchor.addEventListener("click", function (e) {
          e.preventDefault();
          const target = document.querySelector(this.getAttribute("href"));
          if (target) {
            target.scrollIntoView({
              behavior: "smooth",
              block: "start",
            });
          }
        });
      });
    </script>

    {% block extra_js %}{% endblock %}
  </body>
</html>
